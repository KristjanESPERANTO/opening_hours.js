<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Simple page using opening_hours.js</title>
    <meta charset="utf-8">
    <link rel="shortcut icon" type="image/png" href="https://openingh.openstreetmap.de/evaluation_tool/img/favicon.png">
    <script src="https://openingh.openstreetmap.de/opening_hours.js/opening_hours+deps.min.js"></script>
  </head>

  <body>

    <h1>Nothing to see here, open a debug console in your browser to see the interesting stuff.</h1>

    <script>
      // Input string (English and German mixed) - intentionally using mixed languages to demonstrate prettification.
      let input_value = "Mo-Tu,Do-Fr 10:00-20:00; Samstag und Sonntag geschlossen";

      // Language for the warnings (get it from the browser settings).
      let locale = navigator.language;

      // Create opening_hours object.
      let oh = new opening_hours(input_value, {}, { locale: locale });

      // Prettify the value in different languages.
      let prettified_value_de = oh.prettifyValue({ conf: { locale: "de" } });
      let prettified_value_en = oh.prettifyValue({ conf: { locale: "en" } });
      let prettified_value_ru = oh.prettifyValue({ conf: { locale: "ru" } });

      // Console outputs.
      console.log(`Input value (German and English mixed): ${input_value}`);
      console.log(`Prettified value (de):                  ${prettified_value_de}`);
      console.log(`Prettified value (en):                  ${prettified_value_en}`);
      console.log(`Prettified value (ru):                  ${prettified_value_ru}`);
      console.log(`Warnings:\n  ${oh.getWarnings().join("\n  ")}`);

      // Show the state of the opening hours for different dates.
      let date = new Date();
      date.setHours(11, 0, 0, 0);
      let last_monday = new Date(date);
      last_monday.setDate(date.getDate() - (date.getDay() + 6) % 7 - 7);
      let last_sunday = new Date(date);
      last_sunday.setDate(date.getDate() - (date.getDay() + 6) % 7 - 1);
      let next_monday = new Date(date);
      next_monday.setDate(date.getDate() + (8 - date.getDay()) % 7);
      let next_sunday = new Date(date);
      next_sunday.setDate(date.getDate() + (8 - date.getDay()) % 7 + 6);
      let today = new Date(date);
      let tomorrow = new Date(date);
      tomorrow.setDate(date.getDate() + 1);

      console.log(`\nShow the state of the opening hours for the following dates:`);
      console.log(`Last Monday:    ${last_monday.toLocaleString()} - ${oh.getStateString(last_monday, true)}`);
      console.log(`Last Sunday:    ${last_sunday.toLocaleString()} - ${oh.getStateString(last_sunday, true)}`);
      console.log(`Next Monday:    ${next_monday.toLocaleString()} - ${oh.getStateString(next_monday, false)}`);
      console.log(`Next Sunday:    ${next_sunday.toLocaleString()} - ${oh.getStateString(next_sunday, false)}`);
      console.log(`Today:          ${today.toLocaleString()} - ${oh.getStateString(today, false)}`);
      console.log(`Tomorrow:       ${tomorrow.toLocaleString()} - ${oh.getStateString(tomorrow, false)}`);
    </script>

  </body>
</html>
